services:
  kiosko-media-center:
    container_name: kiosko-media-center
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATA_DIR: /app/data
    volumes:
      - kiosko_volume:/app/data

volumes:
  kiosko_volume:
    external: true