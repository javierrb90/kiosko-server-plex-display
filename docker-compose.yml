services:

  plex-display:

    container_name: kiosko-server-plex-display

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      PLEX_URL: ${PLEX_URL}
      PLEX_TOKEN: ${PLEX_TOKEN}

    networks:
      arrnet:
        aliases:
          - plex-display
          - kiosko

networks:

  arrnet:
    external: true