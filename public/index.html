<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kiosko Media Center</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/api/custom-css/global" data-custom-css="global">
  <link rel="stylesheet" href="/api/custom-css/dashboard" data-custom-css="dashboard">
  <link rel="stylesheet" href="/api/custom-css/notifications" data-custom-css="notifications">
  <link rel="stylesheet" href="/api/custom-css/current" data-custom-css="current">
  <link rel="stylesheet" href="/api/custom-css/collections" data-custom-css="collections">
  <link rel="stylesheet" href="/notification-overlay-critical.css">
</head>
<body>
  <main id="app" aria-live="polite">
    <section class="view" data-view="dashboard" aria-hidden="true"></section>
    <section class="view" data-view="current-content" aria-hidden="true"></section>
    <section class="view" data-view="collections" aria-hidden="true"></section>
  </main>
  <div id="dim-overlay" class="dim-overlay" aria-hidden="true"></div>
  <button id="notifications-trigger" class="notifications-trigger" type="button" aria-label="Abrir notificaciones">
    <span class="notifications-trigger__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 22a2.4 2.4 0 0 0 2.3-1.7H9.7A2.4 2.4 0 0 0 12 22Zm7-5-1.7-2.2V10a5.3 5.3 0 0 0-4-5.1V3a1.3 1.3 0 1 0-2.6 0v1.9a5.3 5.3 0 0 0-4 5.1v4.8L5 17v1.2h14V17Z"/></svg></span>
    <span class="notifications-trigger__badge" data-notifications-badge hidden>0</span>
  </button>
  <button id="toast" class="event-toast" type="button" hidden></button>
  <aside id="notifications-overlay" class="notifications-overlay" aria-hidden="true" hidden>
    <button class="notifications-overlay__scrim" type="button" data-close-notifications aria-label="Cerrar notificaciones"></button>
    <section class="notifications-panel" role="dialog" aria-modal="false" aria-label="Centro de notificaciones rápido">
      <header class="notifications-panel__header">
        <div>
          <p class="eyebrow">Actividad reciente</p>
          <h1>Notificaciones</h1>
        </div>
        <button class="notifications-panel__close" type="button" data-close-notifications aria-label="Cerrar">×</button>
      </header>
      <div class="notifications-panel__list notifications-panel__list--scroll" data-notifications-overlay-list></div>
      <footer class="notifications-panel__footer">
        <span data-notifications-overlay-count>Últimas notificaciones</span>
        <button type="button" data-clear-notifications>Limpiar</button>
      </footer>
    </section>
  </aside>
  <div id="modal-root" class="ui-modal-root" hidden></div>
  <div id="ui-toast-root" class="ui-toast-root" aria-live="polite"></div>
  <nav id="dock" class="dock" aria-label="Navegación principal">
    <button data-nav="dashboard" class="dock__item--active" type="button" aria-label="Dashboard"><span class="dock-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13.2 12 6l8 7.2V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-6.8Z"/></svg></span><small>Dashboard</small></button>
    <button data-nav="current-content" type="button" aria-label="Actual"><span class="dock-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h12a4 4 0 0 1 0 8H9v6H4V5Zm5 4h6.7a1 1 0 0 0 0-2H9v2Zm7.5 4.2 4.5 3.2-4.5 3.2v-6.4Z"/></svg></span><small>Actual</small></button>
    <button data-nav="collections" type="button" aria-label="Colecciones"><span class="dock-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h7v7H4V5Zm9 0h7v7h-7V5ZM4 14h7v7H4v-7Zm9 0h7v7h-7v-7Z"/></svg></span><small>Colecciones</small></button>
  </nav>
  <script type="module" src="/app.js"></script>
</body>
</html>
