<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kiosko Media Center</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="app" aria-live="polite">
    <section class="view view--render-hidden" data-view="plex-now-playing" aria-hidden="true"></section>
    <section class="view view--render-hidden" data-view="game-now-playing" aria-hidden="true"></section>
    <section class="view view--active" data-view="notifications" aria-hidden="false"></section>
  </main>
  <button id="sleep-overlay" class="sleep-overlay sleep-overlay--active" type="button" aria-label="Tocar para encender pantalla" aria-hidden="false"><span>TOCA PARA ENCENDER</span></button>
  <script type="module" src="/app.js"></script>
</body>
</html>
